service: talent-land-2026
frameworkVersion: '4'

provider:
  name: aws
  runtime: nodejs20.x
  region: mx-central-1
  stage: staging

custom:
  s3Bucket: talent-land-2026-workshop-example

resources:
  Resources:
    ## Specifying the S3 Bucket
    WebAppS3Bucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.s3Bucket}
        # IMPORTANTE: Esto desactiva las ACLs y usa solo políticas (Soluciona tu error 400)
        OwnershipControls:
          Rules:
            - ObjectOwnership: BucketOwnerEnforced
        # Permitimos que la política del bucket sea pública para el sitio web
        PublicAccessBlockConfiguration:
          BlockPublicAcls: false
          BlockPublicPolicy: false
          IgnorePublicAcls: false
          RestrictPublicBuckets: false
        WebsiteConfiguration:
          IndexDocument: index.html
          ErrorDocument: index.html

    ## Specifying the policies to make sure all files inside the Bucket are available
    WebAppS3BucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket:
          Ref: WebAppS3Bucket
        PolicyDocument:
          Statement:
            - Sid: PublicReadGetObject
              Effect: Allow
              Principal: "*"
              Action:
                - s3:GetObject
              Resource: arn:aws:s3:::${self:custom.s3Bucket}/*

    ## Specifying the CloudFront Distribution
    WebAppCloudFrontDistribution:
      Type: AWS::CloudFront::Distribution
      Properties:
        DistributionConfig:
          Origins:
            - DomainName: ${self:custom.s3Bucket}.s3-website.mx-central-1.amazonaws.com
              Id: WebApp
              CustomOriginConfig:
                HTTPPort: 80
                # S3 Website solo soporta HTTP. CloudFront provee el HTTPS al cliente.
                OriginProtocolPolicy: http-only
          Enabled: true
          DefaultRootObject: index.html
          ## Manejo de rutas para Single Page Application (SPA)
          CustomErrorResponses:
            - ErrorCode: 404
              ResponseCode: 200
              ResponsePagePath: /index.html
            - ErrorCode: 403
              ResponseCode: 200
              ResponsePagePath: /index.html
          DefaultCacheBehavior:
            AllowedMethods:
              - DELETE
              - GET
              - HEAD
              - OPTIONS
              - PATCH
              - POST
              - PUT
            TargetOriginId: WebApp
            ForwardedValues:
              QueryString: false
              Cookies:
                Forward: none
            ViewerProtocolPolicy: redirect-to-https
          ViewerCertificate:
            CloudFrontDefaultCertificate: true

  Outputs:
    WebAppCloudFrontDistributionOutput:
      Value:
        'Fn::GetAtt': [ WebAppCloudFrontDistribution, DomainName ]